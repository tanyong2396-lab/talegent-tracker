<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talegent 邮件追踪系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>📧 Talegent 邮件追踪系统</h1>
            <div class="nav">
                <button class="active" onclick="showTab('dashboard')">📊 总览</button>
                <button onclick="showTab('tracking')">📋 追踪记录</button>
                <button onclick="showTab('send')">📤 发送邮件</button>
            </div>
        </header>

        <div id="dashboard" class="tab-content active">
            <div class="cards">
                <div class="card"><h3>总发送</h3><p id="totalSent">0</p></div>
                <div class="card"><h3>已打开</h3><p id="totalOpened">0</p></div>
                <div class="card"><h3>打开率</h3><p id="openRate">0%</p></div>
                <div class="card"><h3>未回复</h3><p id="pendingFollowup">0</p></div>
            </div>
            <h2>📌 最近追踪记录</h2>
            <table>
                <thead><tr><th>客户</th><th>打开次数</th><th>首次打开</th><th>最近打开</th><th>地点</th></tr></thead>
                <tbody id="recentBody"><tr><td colspan="5">加载中...</td></tr></tbody>
            </table>
        </div>

        <div id="tracking" class="tab-content">
            <h2>📋 所有追踪记录</h2>
            <table>
                <thead><tr><th>客户邮箱</th><th>活动</th><th>打开时间</th><th>国家</th><th>城市</th></tr></thead>
                <tbody id="allBody"><tr><td colspan="5">加载中...</td></tr></tbody>
            </table>
        </div>

        <div id="send" class="tab-content">
            <h2>📤 生成追踪链接</h2>
            <div class="form">
                <label>客户邮箱：</label>
                <input type="email" id="emailInput" placeholder="jeff@n1critical.com">
                <label>活动名称：</label>
                <input type="text" id="campaignInput" placeholder="20260429-jeff-vitality">
                <button onclick="generateLink()">🔗 生成追踪链接</button>
                <div id="linkResult" style="display:none;">
                    <label>✅ 追踪链接：</label>
                    <textarea id="trackingLink" rows="2" readonly></textarea>
                    <button onclick="copyLink()">📋 复制</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
